name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install just
        shell: bash
        run: cargo install just --locked

      - name: Run local verification gate
        shell: bash
        run: just verify

  native-check:
    name: Native Check (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AppKit
            os: macos-latest
          - name: GTK4
            os: ubuntu-latest
          - name: WinUI
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Windows target
        if: runner.os == 'Windows'
        shell: bash
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install GTK4 dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev pkg-config

      - name: Install just
        shell: bash
        run: cargo install just --locked

      - name: Check host native backend
        shell: bash
        run: just check-native

      - name: Run dogfood regression
        shell: bash
        run: just dogfood-regression

  bundle-smoke:
    name: Bundle Smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AppKit
            os: macos-latest
            platform: macos-appkit
            artifact_name: a3s-gui-dogfood-macos
            bundle_path: target/release/bundle/A3SGuiDogfood.app
          - name: GTK4
            os: ubuntu-latest
            platform: linux-gtk4
            artifact_name: a3s-gui-dogfood-linux
            bundle_path: target/release/bundle/a3s-gui-dogfood-linux
          - name: WinUI
            os: windows-latest
            platform: windows-winui
            artifact_name: a3s-gui-dogfood-windows
            bundle_path: target/release/bundle/a3s-gui-dogfood-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Windows target
        if: runner.os == 'Windows'
        shell: bash
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install GTK4 dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev pkg-config

      - name: Install just
        shell: bash
        run: cargo install just --locked

      - name: Build, stage, and validate native bundle
        shell: bash
        run: just bundle-gate-native

      - name: Archive native bundle
        shell: bash
        run: |
          archive="target/release/bundle/${{ matrix.artifact_name }}.tar.gz"
          bundle_path="${{ matrix.bundle_path }}"
          tar -czf "$archive" -C "$(dirname "$bundle_path")" "$(basename "$bundle_path")"
          packaging/write-file-sha256.sh "$archive" > "${archive}.sha256"
          packaging/write-archive-metadata.sh "$archive" "${{ matrix.platform }}" "${{ matrix.artifact_name }}" "${archive}.metadata.txt"
          packaging/check-archive-metadata.sh "$archive" "${archive}.sha256" "${archive}.metadata.txt" "${{ matrix.platform }}" "${{ matrix.artifact_name }}"
          echo "A3S_GUI_BUNDLE_ARCHIVE=$archive" >> "$GITHUB_ENV"
          echo "A3S_GUI_BUNDLE_ARCHIVE_SHA256=${archive}.sha256" >> "$GITHUB_ENV"
          echo "A3S_GUI_BUNDLE_ARCHIVE_METADATA=${archive}.metadata.txt" >> "$GITHUB_ENV"

      - name: Upload native bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ env.A3S_GUI_BUNDLE_ARCHIVE }}
            ${{ env.A3S_GUI_BUNDLE_ARCHIVE_SHA256 }}
            ${{ env.A3S_GUI_BUNDLE_ARCHIVE_METADATA }}
          if-no-files-found: error
