name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.95.0"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component clippy,rustfmt
          rustup default "${RUST_TOOLCHAIN}"

      - name: Install just
        shell: bash
        run: cargo install just --locked

      - name: Run local verification gate
        shell: bash
        run: just verify

  native-check:
    name: Native Check (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AppKit
            os: macos-latest
            feature: appkit-native
            backend: appkit
          - name: GTK4
            os: ubuntu-latest
            feature: gtk4-native
            backend: gtk4
          - name: WinUI
            os: windows-latest
            feature: winui-native
            backend: winui
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component clippy,rustfmt
          rustup default "${RUST_TOOLCHAIN}"

      - name: Install Windows target
        if: runner.os == 'Windows'
        shell: bash
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install GTK4 dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev pkg-config

      - name: Test native library
        shell: bash
        run: cargo test --locked --lib --features "${{ matrix.feature }}"

      - name: Check all native targets
        shell: bash
        run: cargo check --locked --all-targets --features "${{ matrix.feature }}"

      - name: Generate required native input matrix
        shell: bash
        run: |
          cargo run --locked --bin a3s-gui-native-input-conformance -- manifest "${{ matrix.backend }}" > "native-input-${{ matrix.backend }}.json"

      - name: Upload required native input matrix
        uses: actions/upload-artifact@v6
        with:
          name: native-input-requirements-${{ matrix.backend }}
          path: native-input-${{ matrix.backend }}.json
          if-no-files-found: error

      - name: Install Windows App Runtime 1.7 for OS-input smoke
        if: runner.os == 'Windows' && github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'WindowsAppRuntimeInstall-x64.exe'
          Invoke-WebRequest 'https://aka.ms/windowsappsdk/1.7/1.7.260224002/windowsappruntimeinstall-x64.exe' -OutFile $installer
          & $installer --quiet
          if ($LASTEXITCODE -ne 0) {
            throw "Windows App Runtime installer exited with code $LASTEXITCODE"
          }

      - name: Capture WinUI button-backed role OS-input smoke evidence
        if: runner.os == 'Windows' && github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: >-
          cargo run --locked --no-default-features --features winui-native
          --bin a3s-gui-winui-input-smoke -- native-input-winui-smoke.json

      - name: Upload WinUI button-backed role OS-input smoke evidence
        if: always() && runner.os == 'Windows' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: native-input-smoke-winui
          path: native-input-winui-smoke.json
          if-no-files-found: error

  bundle-smoke:
    name: Bundle Smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AppKit
            os: macos-latest
            platform: macos-appkit
            artifact_name: a3s-gui-dogfood-macos
            bundle_path: target/release/bundle/A3SGuiDogfood.app
          - name: GTK4
            os: ubuntu-latest
            platform: linux-gtk4
            artifact_name: a3s-gui-dogfood-linux
            bundle_path: target/release/bundle/a3s-gui-dogfood-linux
          - name: WinUI
            os: windows-latest
            platform: windows-winui
            artifact_name: a3s-gui-dogfood-windows
            bundle_path: target/release/bundle/a3s-gui-dogfood-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component clippy,rustfmt
          rustup default "${RUST_TOOLCHAIN}"

      - name: Install Windows target
        if: runner.os == 'Windows'
        shell: bash
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install GTK4 dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev pkg-config

      - name: Install just
        shell: bash
        run: cargo install just --locked

      - name: Build, stage, and validate native bundle
        shell: bash
        run: just bundle-gate-native

      - name: Archive native bundle
        shell: bash
        run: |
          archive="target/release/bundle/${{ matrix.artifact_name }}.tar.gz"
          bundle_path="${{ matrix.bundle_path }}"
          tar -czf "$archive" -C "$(dirname "$bundle_path")" "$(basename "$bundle_path")"
          packaging/write-file-sha256.sh "$archive" > "${archive}.sha256"
          packaging/write-archive-metadata.sh "$archive" "${{ matrix.platform }}" "${{ matrix.artifact_name }}" "${archive}.metadata.txt"
          packaging/check-archive-metadata.sh "$archive" "${archive}.sha256" "${archive}.metadata.txt" "${{ matrix.platform }}" "${{ matrix.artifact_name }}"
          echo "A3S_GUI_BUNDLE_ARCHIVE=$archive" >> "$GITHUB_ENV"
          echo "A3S_GUI_BUNDLE_ARCHIVE_SHA256=${archive}.sha256" >> "$GITHUB_ENV"
          echo "A3S_GUI_BUNDLE_ARCHIVE_METADATA=${archive}.metadata.txt" >> "$GITHUB_ENV"

      - name: Upload native bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ env.A3S_GUI_BUNDLE_ARCHIVE }}
            ${{ env.A3S_GUI_BUNDLE_ARCHIVE_SHA256 }}
            ${{ env.A3S_GUI_BUNDLE_ARCHIVE_METADATA }}
          if-no-files-found: error
